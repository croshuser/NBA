<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Simulator</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 450px; margin: 40px auto; padding: 0 15px; }
        label, select, button { display: block; width: 100%; margin: 8px 0; }
        select, button { padding: 8px; font-size: 16px; }
        button { cursor: pointer; }
        #result { margin-top: 20px; text-align: center; font-size: 18px; }
    </style>
</head>
<body>
    <h1>NBA Matchup Simulator</h1>

    <label for="season">Season</label>
    <select id="season"></select>

    <label for="teamA">Team A</label>
    <select id="teamA"></select>

    <label for="teamB">Team B</label>
    <select id="teamB"></select>

    <label for="home">Home team</label>
    <select id="home">
        <option value="A">Team A</option>
        <option value="B">Team B</option>
    </select>

    <button id="simulate">Simulate Game</button>

    <div id="result"></div>

    <script src="script.js"></script>
</body>
</html>
